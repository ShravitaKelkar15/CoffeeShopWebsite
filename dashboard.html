<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Shop Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Coffee Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#cart">Cart</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Menu Section -->
    <section class="menu-section py-5">
        <div class="container">
            <h2 class="text-center mb-4">Our Coffee Menu</h2>
            <div class="row" id="coffee-menu">
                <!-- Coffee Menu Cards will be generated here -->
            </div>

            <!-- Pagination Controls -->
            <div class="d-flex justify-content-between mt-4">
                <a href="D:/Coffee Shop Website/dashboard2.html" class="btn btn-secondary">Previous</a>
                <a href="D:/Coffee Shop Website/dashboard2.html" class="btn btn-primary">Next</a>
            </div>
        </div>
    </section>

    <!-- Cart Section -->
    <section id="cart" class="cart-section py-5 bg-light">
        <div class="container">
            <h3 class="text-center mb-4">Your Cart</h3>
            <ul class="list-group mb-3" id="cart-items">
                <!-- Cart items will be displayed here -->
            </ul>
            <div class="d-flex justify-content-between align-items-center">
                <h4>Total: ₹<span id="total-price">0.00</span></h4>
                <button class="btn btn-success" id="checkout-btn">Order Now</button>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript for Menu and Cart -->
    <script>
        // Conversion rate from USD to INR
        const USD_TO_INR = 83;

        // Reasonable price in INR (between ₹35 and ₹200)
        const MIN_PRICE_INR = 35;
        const MAX_PRICE_INR = 200;

        // Coffee Data Array (30 different coffees with whole prices and discounts)
        const coffees = Array.from({ length: 30 }, (_, i) => {
            const priceINR = Math.floor(Math.random() * (MAX_PRICE_INR - MIN_PRICE_INR) + MIN_PRICE_INR); // Whole price
            let imageUrl;

            // Assigning images to the first 9 coffees with the provided paths
            switch(i + 1) {
                case 1:
                    imageUrl = `D:/Coffee Shop Website/assets/coffee 1.jpg`;
                    break;
                case 2:
                    imageUrl = `D:/Coffee Shop Website/assets/coffee2.jpg`;
                    break;
                case 3:
                    imageUrl = `D:/Coffee Shop Website/assets/coffee3.jpg`;
                    break;
                case 4:
                    imageUrl = `D:/Coffee Shop Website/assets/coffee4.jpg`;
                    break;
                case 5:
                    imageUrl = `D:/Coffee Shop Website/assets/coffee5.jpg`;
                    break;
                case 6:
                    imageUrl = `D:/Coffee Shop Website/assets/coffee6.jpg`;
                    break;
                case 7:
                    imageUrl = `D:/Coffee Shop Website/assets/coffee7.jpg`;
                    break;
                case 8:
                    imageUrl = `D:/Coffee Shop Website/assets/coffee8.jpg`;
                    break;
                case 9:
                    imageUrl = "D:/Coffee Shop Website/assets/coffee9.jpg";
                    break;
                case 10:
                    imageUrl ="D:/Coffee Shop Website/assets/m2.png";
                    break;
                case 11:
                    imageUrl ="D:/Coffee Shop Website/assets/m3.png";
                    break;
                case 12:
                    imageUrl ="D:/Coffee Shop Website/assets/m4.png";
                    break;
                case 13:
                    imageUrl ="D:/Coffee Shop Website/assets/m5.png";
                    break;
                case 14:
                    imageUrl ="D:/Coffee Shop Website/assets/m6.png";
                    break;
                case 15:
                    imageUrl ="D:/Coffee Shop Website/assets/m7.png";
                    break;
                case 16:
                    imageUrl ="D:/Coffee Shop Website/assets/m8.png";
                    break;
                case 17:
                    imageUrl ="D:/Coffee Shop Website/assets/cof4.jpeg";
                    break;
                case 18:
                    imageUrl ="D:/Coffee Shop Website/assets/cof5.jpg";
                    break;
                case 19:
                    imageUrl ="D:/Coffee Shop Website/assets/cof3.jpg";
                    break;
                case 20:
                    imageUrl ="D:/Coffee Shop Website/assets/cof2.JPG";
                    break;
                case 21:
                    imageUrl ="D:/Coffee Shop Website/assets/cof1.jpg";
                    break;
                case 22:
                    imageUrl ="D:/Coffee Shop Website/assets/cof12.avif";
                    break;
                case 23:
                    imageUrl ="D:/Coffee Shop Website/assets/cof9.jpg";
                    break;
                case 24:
                    imageUrl ="D:/Coffee Shop Website/assets/cof14.jpeg";
                    break;
                case 25:
                    imageUrl ="D:/Coffee Shop Website/assets/cof13.jpeg";
                    break;
                case 26:
                    imageUrl ="D:/Coffee Shop Website/images/cof11.jpg";
                    break;
                case 27:
                    imageUrl ="D:/Coffee Shop Website/assets/cof10.png";
                    break;
                case 28:
                    imageUrl ="D:/Coffee Shop Website/assets/cof8.jpg.avif";
                    break;
                case 29:
                    imageUrl ="D:/Coffee Shop Website/assets/cof7.jpeg";
                    break;
                case 30:
                    imageUrl ="D:/Coffee Shop Website/assets/cof6.jpeg";
                    break;
                default:
                    // Use the default image path pattern for remaining coffees
                    imageUrl = `D:/Coffee Shop Website/images/m${(i + 1) > 30 ? (i + 1) : i}.png`;
            }

            return {
                name: `Coffee ${i + 1}`,
                priceUSD: Math.floor(priceINR / USD_TO_INR), // Converted back to whole USD for display
                priceINR: priceINR, // Random whole price between ₹35 and ₹200
                discount: Math.floor(Math.random() * 26) + 5, // Random discount between 5% and 30%
                imageUrl: imageUrl // Updated image paths for specific coffees
            };
        });

        const coffeeMenu = document.getElementById('coffee-menu');
        const cartItems = document.getElementById('cart-items');
        const totalPriceElement = document.getElementById('total-price');
        let cart = [];

        // Function to render coffee menu
        function renderCoffeeMenu() {
            coffeeMenu.innerHTML = coffees.map((coffee, index) => `
                <div class="col-md-4 mb-4">
                    <div class="card h-100">
                        <img src="${coffee.imageUrl}" class="card-img-top" alt="Coffee Image" style="width: 150px; height: 150px;">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">${coffee.name}</h5>
                            <p class="card-text">Price: ₹${coffee.priceINR}</p>
                            <p class="card-text">Discount: ${coffee.discount}% off</p>
                            <button class="btn btn-primary mt-auto" onclick="addToCart(${index})">Add to Cart</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Function to add coffee to cart
        function addToCart(index) {
            const coffee = coffees[index];
            const discountedPrice = Math.floor(coffee.priceINR - (coffee.priceINR * coffee.discount / 100));
            cart.push({ ...coffee, discountedPrice });
            updateCart();
        }

        // Function to update the cart display and total price
        function updateCart() {
            cartItems.innerHTML = cart.map((item, index) => `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    ${item.name} - ₹${item.discountedPrice}
                    <button class="btn btn-danger btn-sm" onclick="removeFromCart(${index})">Remove</button>
                </li>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.discountedPrice, 0);
            totalPriceElement.textContent = total;
        }

        // Function to remove an item from the cart
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        // Function to handle checkout
        function handleCheckout() {
            if (cart.length === 0) {
                alert('Your cart is empty!');
                return;
            }

            const totalPrice = totalPriceElement.textContent;
            const coffeeOrder = cart.map(item => ({
                name: item.name,
                discountedPrice: item.discountedPrice
            }));

            localStorage.setItem('coffeeOrder', JSON.stringify(coffeeOrder));
            localStorage.setItem('totalPrice', totalPrice);

            window.location.href = 'orders.html';
        }

        // Event listener for checkout button
        document.getElementById('checkout-btn').addEventListener('click', handleCheckout);

        // Initial rendering of the coffee menu
        renderCoffeeMenu();
    </script>
</body>
</html>
