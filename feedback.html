<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Shop Feedback</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .feedback-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    .feedback-section {
      flex: 1;
      margin-right: 20px;
    }

    .feedback-section h2 {
      color: #333;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: bold;
      text-align: left;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
      border-color: #4CAF50;
      outline: none;
    }

    textarea {
      resize: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #45a049;
    }

    #feedback-list {
      margin-top: 30px;
      text-align: left;
    }

    .feedback-item {
      background-color: #f9f9f9;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    .feedback-item strong {
      color: #333;
    }

    .feedback-item p {
      margin: 10px 0;
      color: #555;
    }

    /* Image section */
    .image-section {
      flex: 0 0 300px;
      max-width: 300px;
      margin: auto;
    }

    .image-section img {
      width: 100%;
      border-radius: 10px;
    }

    /* Responsive adjustments */
    @media (max-width: 900px) {
      .feedback-container {
        flex-direction: column;
        padding: 15px;
      }

      .feedback-section {
        margin-right: 0;
        margin-bottom: 20px;
      }

      .image-section {
        max-width: 100%;
      }
    }

    @media (max-width: 600px) {
      button {
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="feedback-container">
    <div class="feedback-section">
      <h2>We Value Your Feedback</h2>
      
      <form id="feedback-form">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" placeholder="Enter your name" required>

        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="message">Your Feedback:</label>
        <textarea id="message" name="message" rows="5" placeholder="Leave your feedback here..." required></textarea>

        <button type="submit">Submit Feedback</button>
      </form>

      <div id="feedback-list">
        <!-- Displayed feedback will appear here -->
      </div>
    </div>

    <div class="image-section">
      <img src="D:/Coffee Shop Website/images/feedback.png" alt="Feedback Image">
    </div>
  </div>

  <script>
    document.getElementById('feedback-form').addEventListener('submit', function (e) {
      e.preventDefault();

      // Get form data
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;

      if (!name || !email || !message) {
        alert("Please fill in all fields!");
        return;
      }

      // Create a new feedback element
      const feedbackList = document.getElementById('feedback-list');
      const newFeedback = document.createElement('div');
      newFeedback.classList.add('feedback-item');
      newFeedback.innerHTML = `
        <strong>${name}</strong> (${email})<br>
        <p>${message}</p>
        <hr>
      `;

      // Add the feedback to the list
      feedbackList.appendChild(newFeedback);

      // Clear the form
      document.getElementById('feedback-form').reset();
    });
  </script>
</body>
</html>
